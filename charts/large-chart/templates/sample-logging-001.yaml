{{- if and .Values.modules.logging .Values.modules.logging.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "large-chart.fullname" . }}-logging-001
  labels:
    {{- include "large-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: logging
data:
  module: "logging"
  sampleId: "1"
  description: "Sample configmap for logging module - template 1"
{{- end }}
