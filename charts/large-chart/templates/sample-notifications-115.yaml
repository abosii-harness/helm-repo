{{/*
  Template: notifications-115
  Module: notifications
  Description: Extended configuration template for the notifications module.
  This template provides comprehensive configuration options for the
  notifications subsystem including resource limits, environment variables,
  annotations, volume mounts, and additional metadata.
  
  Usage:
    Enable this template by setting:
      modules.notifications.enabled: true
    in your values.yaml file.

  Parameters:
    - module: The name of the module (notifications)
    - sampleId: Unique identifier for this template (115)
    - component: Kubernetes component label
    - tier: Application tier classification
    - version: Configuration schema version
*/}}
{{- if and .Values.modules.notifications .Values.modules.notifications.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "large-chart.fullname" . }}-notifications-115
  labels:
    {{- include "large-chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: notifications
    app.kubernetes.io/part-of: large-chart
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ include "large-chart.chart" . }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
    configmap.kubernetes.io/description: "Extended config for notifications module - template 115"
data:
  module: "notifications"
  sampleId: "115"
  description: "Sample configmap for notifications module - template 115"
  config.yaml: |
    module:
      name: notifications
      id: 115
      version: "1.0.0"
      tier: "standard"
    settings:
      logLevel: "info"
      retryCount: 3
      timeoutSeconds: 30
      bufferSize: 1024
      maxConnections: 100
      keepAliveInterval: 60
      flushIntervalMs: 5000
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    metadata:
      createdBy: "helm-chart"
      templateVersion: "v2"
      region: "default"
      environment: "production"
      category: "notifications"
      subcategory: "config-115"
      tags:
        - "notifications"
        - "auto-generated"
        - "template-115"
        - "large-chart"
{{- end }}
